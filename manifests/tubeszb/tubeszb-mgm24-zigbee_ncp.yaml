name: TubesZB MGM24 Zigbee NCP
device: MGM240PA32VNN
base_project: src/zigbee_ncp
filename: "{manifest_name}_{ezsp_version}_{baudrate}_{fw_variant}"
sdk: "simplicity_sdk:2025.6.2"
toolchain: "12.2.1.20221205"

gbl:
  fw_type: zigbee_ncp
  ezsp_version: dynamic
  baudrate: 460800
  fw_variant: hw_flow

add_components:
  # Status
  - id: zigbee_mfglib
  - id: zigbee_token_interface
  - id: simple_led
    instance:
      - board_activity
  - id: rail_util_pti
 
c_defines:
  SL_IOSTREAM_EUSART_VCOM_BAUDRATE: 460800
  SL_IOSTREAM_EUSART_VCOM_FLOW_CONTROL_TYPE: SL_IOSTREAM_EUSART_UART_FLOW_CTRL_CTS_RTS

  SL_IOSTREAM_EUSART_VCOM_PERIPHERAL: EUSART0
  SL_IOSTREAM_EUSART_VCOM_PERIPHERAL_NO: 0

  SL_IOSTREAM_EUSART_VCOM_TX_PORT: SL_GPIO_PORT_A
  SL_IOSTREAM_EUSART_VCOM_TX_PIN: 6

  SL_IOSTREAM_EUSART_VCOM_RX_PORT: SL_GPIO_PORT_A
  SL_IOSTREAM_EUSART_VCOM_RX_PIN: 5

  SL_IOSTREAM_EUSART_VCOM_CTS_PORT: SL_GPIO_PORT_A
  SL_IOSTREAM_EUSART_VCOM_CTS_PIN: 7

  SL_IOSTREAM_EUSART_VCOM_RTS_PORT: SL_GPIO_PORT_A
  SL_IOSTREAM_EUSART_VCOM_RTS_PIN: 8

  SL_IOSTREAM_EUSART_VCOM_RX_BUFFER_SIZE: 512

  SL_SIMPLE_LED_BOARD_ACTIVITY_POLARITY: SL_SIMPLE_LED_POLARITY_ACTIVE_LOW
  SL_SIMPLE_LED_BOARD_ACTIVITY_PORT: SL_GPIO_PORT_D
  SL_SIMPLE_LED_BOARD_ACTIVITY_PIN: 2

  SL_CLOCK_MANAGER_HFXO_EN: 1
  SL_CLOCK_MANAGER_HFXO_CTUNE: 140
  SL_CLOCK_MANAGER_DEFAULT_HF_CLOCK_SOURCE: SL_CLOCK_MANAGER_DEFAULT_HF_CLOCK_SOURCE_HFXO

  SL_RAIL_UTIL_RSSI_OFFSET: 0
  SL_RAIL_UTIL_PTI_MODE: RAIL_PTI_MODE_UART
  SL_RAIL_UTIL_PTI_BAUD_RATE_HZ: 1600000
  SL_RAIL_UTIL_PTI_DOUT_PORT: SL_GPIO_PORT_C
  SL_RAIL_UTIL_PTI_DOUT_PIN: 4
  SL_RAIL_UTIL_PTI_DFRAME_PORT: SL_GPIO_PORT_C
  SL_RAIL_UTIL_PTI_DFRAME_PIN: 5


